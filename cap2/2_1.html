<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1> Olá Você</h1>

    <form action="">
        <p>Nome: 
            <input type="text" id="inNome">
            <input type="submit" value="mostrar">
        </p>
    </form>
    <h3></h3>

    <script>
        //Aqui eu estou selecionando os campos no HTML para depois poder modifica-los.
        const form = document.querySelector("form");
        const resp = document.querySelector("h3");

        form.addEventListener("submit", (e) =>{
            const nome = form.inNome.value //pegando o valor do nome no form.
            resp.innerText = `Olá, ${nome}` //Na linha de cima salvamos o nome do form na variável nome e então mostramos ela aqui no h3;
            e.preventDefault() //sempre colocar funcão.preventDefault para não enviar os dados e então atualizar a página.
        })

    </script>
</body>
</html>
