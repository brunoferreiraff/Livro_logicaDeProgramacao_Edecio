<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        const bairro = prompt("Bairro de Entrega: ");
        let taxaEntrega

        switch (bairro) {
            case "centro":
                taxaEntrega = 5.00
                break;
            case "Bonfim":
                taxaEntrega = 3.00
                break;
            case "Tijuca":
                taxaEntrega = 4.00
                break;
            case "Lagoa":
                taxaEntrega = 2.00
                break;
            case "Ipanema":
                taxaEntrega = 1.00
                break;

            default:
                taxaEntrega = 8.00
        }

        console.log(taxaEntrega)
    </script>
</body>

</html>
