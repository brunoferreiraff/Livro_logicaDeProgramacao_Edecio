<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>Situação do Aluno</h1>

    <form action="">
        Nome do Aluno: <input type="text" id="inNome">
        <p>
            Primeira Nota: <input type="number" id="nota1" step="0.01" max="10" required>
        <p>
            Segunda Nota: <input type="number" id="nota2" step="0.01" max="10" required>
        <p>
            <input type="submit" id="botao" value="Exibir média e Situação">

        <h3></h3>
        <h4></h4>
    </form>

    <script>
        const frm = document.querySelector("form");
        const resp1 = document.querySelector("h3");
        const resp2 = document.querySelector("h4");

        frm.addEventListener("submit", (e) => {
            e.preventDefault()
            const nome = frm.inNome.value;

            const nota1 = Number(frm.nota1.value);
            const nota2 = Number(frm.nota2.value);

            const media = (nota1 + nota2) / 2;
            resp1.innerText = `Média das notas = ${media}`;

            if (media >= 7) {
                resp2.innerText = `Parabéns, ${nome}, você foi APROVADO!`
                resp2.style.color = "blue";
            } else if (media >= 4) {
                resp2.innerText = `Você tem um exame final`
                resp2.style.color = "green";
            } else {
                resp2.innerText = `Que pena, ${nome}, você foi REPROVADO`;
                resp2.style.color = "red";
            }
        })
    </script>
</body>

</html>
