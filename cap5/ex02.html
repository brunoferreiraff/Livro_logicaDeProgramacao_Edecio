<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>
        Programa Numeros Decrescentes

    </h1>
    <hr>

    <form action="">
        <input type="number" required id="inNumero">
        <input type="number" required id="inNumber">
        <input type="submit" value="Decrescer até o valor desejado">
    </form>
<h3></h3>
    <script>
        const frm = document.querySelector("form");
        const resp = document.querySelector("h3")

        frm.addEventListener("submit", (e) =>{
            e.preventDefault();

            const numero = Number(frm.inNumero.value);
            let min = Number(frm.inNumber.value)
            let resposta = `Entre ${numero} e 1: `;
            for (let i = numero; i >=  min; i = i - 1){
                resposta = resposta + i + " , "
            }
            resp.innerText = resposta

        })
    </script>
</body>
</html>
